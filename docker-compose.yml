# docker-compose.yml — single-container deployment for Solution Acceleration Engine.
#
# Architecture:
#   Single service, single port (8000). Reflex backend serves the UI
#   (pre-built static assets) and FastAPI API routes on the same port.
#
# Usage:
#   docker compose up --build          # first run (builds image + starts)
#   docker compose up -d               # detached
#   docker compose logs -f sae         # tail logs
#   docker compose down                # stop (data persists in ./data/)
#
# Data persistence:
#   SQLite DB and artifact files stored in ./data/ (bind-mounted).
#   Survives docker compose down / up cycles.

services:
  sae:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
    env_file:
      - path: .env
        required: false
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
